name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, test, and build
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check Swift package dependency parity
        run: ruby scripts/check_dependency_parity.rb

      - name: Validate manual dogfood corpus
        run: ruby scripts/check_dogfood_corpus.rb

      - name: Test private observed-query exporter
        run: ruby scripts/test_observed_query_export.rb

      - name: Select Xcode 26.6
        run: sudo xcode-select --switch /Applications/Xcode_26.6.app/Contents/Developer

      - name: Record toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Check formatting
        run: xcrun swift-format lint --strict -r Package.swift Sources Tests

      - name: Test Chrome extension and native-host registration
        run: |
          node --test ChromeExtension/tests/*.test.mjs
          ruby scripts/test_chrome_native_host.rb

      - name: Run unit tests
        run: swift test

      - name: Build unsigned Debug app
        run: |
          xcodebuild \
            -project Topher.xcodeproj \
            -scheme TopherApp \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/TopherDebugDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned Release app
        run: |
          xcodebuild \
            -project Topher.xcodeproj \
            -scheme TopherApp \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/TopherReleaseDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
